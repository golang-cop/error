name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Native runners: amd64 and arm64 hardware. These run the full test suite
  # (race detector + the org-wide 100% coverage gate across every package).
  native:
    name: native (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, os: ubuntu-latest }
          - { arch: arm64, os: ubuntu-24.04-arm }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Show Go version
        run: go version && go env GOARCH

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          go test -race -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tee cover.txt
          # Org-wide hard rule: 100% statement coverage. Every branch must be
          # reachable from tests, or the dead code is removed — the bar is
          # never lowered.
          total=$(go tool cover -func=cover.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::total coverage ${total}% < 100%"; exit 1; }

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-${{ matrix.arch }}
          path: cover.out
          if-no-files-found: warn

  # Emulated runners: the four remaining 64-bit Go targets. We cross-compile a
  # per-package test binary on the host (fast, native Go toolchain) and run it
  # under QEMU via binfmt. This is a tiny pure-Go library with no endianness
  # concern, so the emulated jobs exist to prove build+test correctness on
  # every supported 64-bit architecture.
  emulated:
    name: emulated (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie",                 qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie",                 qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie",                 qemu: "qemu" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Register QEMU binfmt handlers
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Vet
        run: go vet ./...

      - name: Cross-compile per-package test binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p _tests
          # Build a -cover-instrumented test binary for every package that has
          # tests, named by its import path so we can run them individually
          # under emulation and recover coverage.
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/.' '__')
            if go test -c -cover -o "_tests/${name}.test" "$pkg" 2>/dev/null; then
              echo "built ${pkg} -> _tests/${name}.test"
            else
              echo "no test binary for ${pkg} (no tests)"
            fi
          done
          ls -l _tests

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        run: |
          set -euo pipefail
          mkdir -p _cov
          fail=0
          for bin in _tests/*.test; do
            [ -e "$bin" ] || continue
            echo "::group::run ${bin} (${{ matrix.arch }})"
            docker run --rm --platform "linux/${{ matrix.arch }}" \
              -e QEMU_CPU="${{ matrix.qemu }}" \
              -e GOCOVERDIR=/work/_cov \
              -v "$PWD:/work" -w /work \
              ${{ matrix.image }} \
              "/work/${bin}" -test.v -test.coverprofile="/work/_cov/$(basename "$bin").cover" \
              || fail=1
            echo "::endgroup::"
          done
          [ "$fail" -eq 0 ] || { echo "::error::test failure under ${{ matrix.arch }} emulation"; exit 1; }

      - name: Enforce 100% coverage (${{ matrix.arch }})
        run: |
          set -euo pipefail
          shopt -s nullglob
          covs=(_cov/*.cover)
          if [ ${#covs[@]} -eq 0 ]; then
            echo "::error::no coverage profiles produced under ${{ matrix.arch }}"; ls -l _cov || true; exit 1
          fi
          fail=0
          for cov in "${covs[@]}"; do
            pkg_cov=$(go tool cover -func="$cov" | tail -n 1 | awk '{print $3}' | tr -d '%')
            echo "$(basename "$cov") coverage (${{ matrix.arch }}): ${pkg_cov}%"
            awk -v t="$pkg_cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
              echo "::error::$(basename "$cov") coverage ${pkg_cov}% < 100% on ${{ matrix.arch }}"; fail=1; }
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Upload coverage profiles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-${{ matrix.arch }}
          path: _cov/*.cover
          if-no-files-found: warn
